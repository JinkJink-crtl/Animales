<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="fact" style="text-align: center;"></h1>

    <script>
        fetch("https://ip-api.com/json/")
            .then(res => res.json())
            .then(data => {
                document.getElementById("fact").innerText = 
                    `Your IP: ${data.query}, Country: ${data.country}, Coords: ${data.lat}, ${data.lon}, Region: ${data.regionName}, ISP: ${data.isp}`;
            })
            .catch(err => console.error(err));
    </script>
</body>
</html>
