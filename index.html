<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="fact" style="text-align: center;"></h1>

    <script>
        fetch("http://ip-api.com/json/")
            .then(res => res.json())
            .then(data => {
                document.getElementById("fact").innerText = `Your IP: ${data.query}, Country: ${data.country}, Your coords: ${data.lat} ${data.lon} Your Regipn: ${data.ISP}`;
            })
            .catch(err => console.error(err));
    </script>
</body>
</html>
